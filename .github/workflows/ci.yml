name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: write
jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Shopware 6.6 requires PHP 8.2+. We test the band the plugin
        # supports via composer.json's "~6.6.0 || ~6.7.0" constraint.
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          # Enable Xdebug coverage only on the primary PHP version to keep the
          # matrix fast; the other versions run without coverage (still gate on
          # test results).
          coverage: ${{ matrix.php == '8.3' && 'xdebug' || 'none' }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite=Unit
        env:
          # Disable Xdebug's debugger (keep profiler/coverage) so tests are not
          # slowed down by step debugging on non-coverage runs.
          XDEBUG_MODE: ${{ matrix.php == '8.3' && 'coverage' || 'off' }}

      - name: Generate Clover coverage report
        if: matrix.php == '8.3'
        run: |
          vendor/bin/phpunit --testsuite=Unit \
            --coverage-clover coverage.xml \
            --coverage-text
          php -r '
            $m = simplexml_load_file("coverage.xml")->project->metrics;
            $pct = (float)$m["coveredstatements"] / (float)$m["statements"] * 100;
            printf("Line coverage: %.1f%%\n", $pct);
            if ($pct < 80) { fwrite(STDERR, "FAIL: line coverage below 80% threshold\n"); exit(1); }
          '
        env:
          XDEBUG_MODE: coverage

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  pdo-integration:
    name: PDO Integration (PostgreSQL 17)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: order_integration
          POSTGRES_USER: order_integration
          POSTGRES_PASSWORD: ci_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_pgsql

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-8.3-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Apply DDL
        run: psql "postgresql://order_integration:ci_secret@localhost:5432/order_integration" -f docs/sql/order_integration_schema.sql

      - name: Run PDO integration tests
        run: vendor/bin/phpunit --testsuite=PdoIntegration
        env:
          ORDER_INTEGRATION_DB_DSN: 'pgsql:host=localhost;port=5432;dbname=order_integration'
          ORDER_INTEGRATION_DB_USER: order_integration
          ORDER_INTEGRATION_DB_PASSWORD: ci_secret
          XDEBUG_MODE: 'off'
