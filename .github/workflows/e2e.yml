name: E2E

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  http-integration:
    name: HTTP Integration (Shopware 6.6)
    runs-on: ubuntu-latest
    env:
      SHOPWARE_URL: http://localhost:8000
      SHOPWARE_ADMIN_USER: admin
      SHOPWARE_ADMIN_PASSWORD: shopware

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Setup Shopware
        uses: shopware/setup-shopware@v2
        with:
          shopware-version: v6.6.10.19
          php-version: '8.3'
          install: 'true'
          install-locale: en-GB
          install-currency: EUR
          install-admin: 'false'
          install-storefront: 'false'
          mysql-version: builtin
          path: shopware

      - name: Install plugin
        working-directory: shopware
        run: |
          mkdir -p custom/plugins
          cp -r $GITHUB_WORKSPACE/plugin-src custom/plugins/OrderIntegration
          php bin/console plugin:refresh
          php bin/console plugin:install --activate OrderIntegration
          php bin/console cache:clear

      - name: Diagnose install state
        run: |
          echo "=== MySQL connection ==="
          mysql -u root -h 127.0.0.1 -e "SELECT 'ok'" 2>&1 || echo "FAILED (exit $?)"
          echo "=== sales_channel rows ==="
          mysql -u root -h 127.0.0.1 shopware --batch -e "SELECT id, name, type_id FROM sales_channel" 2>&1 || echo "FAILED"
          echo "=== tax rows ==="
          mysql -u root -h 127.0.0.1 shopware --batch -e "SELECT COUNT(*) FROM tax" 2>&1 || echo "FAILED"
          echo "=== currency rows ==="
          mysql -u root -h 127.0.0.1 shopware --batch -e "SELECT iso_code FROM currency" 2>&1 || echo "FAILED"
          echo "=== admin user ==="
          mysql -u root -h 127.0.0.1 shopware --batch -e "SELECT username, admin FROM user" 2>&1 || echo "FAILED"
          echo "=== OAuth token test ==="
          curl -sv -X POST "$SHOPWARE_URL/api/oauth/token" \
            -H 'Content-Type: application/json' \
            -d '{"grant_type":"password","client_id":"administration","username":"admin","password":"shopware","scopes":"write"}' \
            2>&1 | tail -30
        continue-on-error: true

      - name: Seed test data
        run: |
          # Read Sales Channel, Tax, Currency from MySQL.
          # The Admin API is unreliable right after cache:clear in APP_ENV=test,
          # and accessKey lacks ApiAware in Shopware 6.6 anyway.
          db() { mysql -u root -h 127.0.0.1 shopware --batch --skip-column-names -e "$1"; }
          hex2uuid() { local h=$1; echo "${h:0:8}-${h:8:4}-${h:12:4}-${h:16:4}-${h:20:12}"; }

          SC_HEX=$(db "SELECT LOWER(HEX(id)) FROM sales_channel LIMIT 1")
          SC_ID=$(hex2uuid "$SC_HEX")
          SC_KEY=$(db "SELECT access_key FROM sales_channel LIMIT 1")

          TAX_HEX=$(db "SELECT LOWER(HEX(id)) FROM tax LIMIT 1")
          TAX_ID=$(hex2uuid "$TAX_HEX")

          CURRENCY_HEX=$(db "SELECT LOWER(HEX(id)) FROM currency WHERE iso_code='EUR' LIMIT 1")
          CURRENCY_ID=$(hex2uuid "$CURRENCY_HEX")

          # Admin token (needed for product creation)
          TOKEN=$(curl -sf -X POST "$SHOPWARE_URL/api/oauth/token" \
            -H 'Content-Type: application/json' \
            -d "{\"grant_type\":\"password\",\"client_id\":\"administration\",\"username\":\"$SHOPWARE_ADMIN_USER\",\"password\":\"$SHOPWARE_ADMIN_PASSWORD\",\"scopes\":\"write\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Create test product via Admin API
          PROD_ID=$(python3 -c "import uuid; print(str(uuid.uuid4()).replace('-',''))")
          curl -sf -X POST "$SHOPWARE_URL/api/product" \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"id\": \"$PROD_ID\",
              \"name\": \"CI Test Product\",
              \"productNumber\": \"CI-TEST-001\",
              \"stock\": 100,
              \"price\": [{\"currencyId\": \"$CURRENCY_ID\", \"gross\": 19.99, \"net\": 16.80, \"linked\": true}],
              \"taxId\": \"$TAX_ID\",
              \"visibilities\": [{\"salesChannelId\": \"$SC_ID\", \"visibility\": 30}],
              \"active\": true
            }" > /dev/null

          # Write .env.test before create_test_order.sh (which sources it)
          printf 'SHOPWARE_URL=%s\nSHOPWARE_ADMIN_USER=%s\nSHOPWARE_ADMIN_PASSWORD=%s\nSHOPWARE_STORE_ACCESS_KEY=%s\nSHOPWARE_SALES_CHANNEL_ID=%s\nSHOPWARE_TEST_PRODUCT_ID=%s\nSHOPWARE_STOREFRONT_URL=%s\n' \
            "$SHOPWARE_URL" "$SHOPWARE_ADMIN_USER" "$SHOPWARE_ADMIN_PASSWORD" \
            "$SC_KEY" "$SC_ID" "$PROD_ID" "$SHOPWARE_URL" \
            > $GITHUB_WORKSPACE/plugin-src/.env.test

          # Seed one order via create_test_order.sh
          bash $GITHUB_WORKSPACE/plugin-src/tests/create_test_order.sh

      - name: Run HTTP integration tests
        run: bash $GITHUB_WORKSPACE/plugin-src/tests/api_test.sh

      - name: Upload Shopware logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shopware-logs
          path: shopware/var/log/
          retention-days: 7
